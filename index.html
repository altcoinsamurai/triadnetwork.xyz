<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Triad Network — Engineering · Advisory · Capital</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Privacy-friendly analytics by Plausible -->
<script async src="https://plausible.io/js/pa-sO608YaKMQ1Jb8JQKbrs2.js"></script>
<script>
  window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
  plausible.init()

<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--teal:#00BFA6;--teal2:#00E8CC;--dark:#08080F;--dark2:#0E0E18;--white:#F0EEE8;--grey:#888}
body{background:var(--dark);color:var(--white);font-family:'Space Grotesk',system-ui,sans-serif;overflow:hidden;height:100vh;height:100dvh;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.gateway{display:flex;height:100vh;height:100dvh;position:relative}
.logo-bar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:center;align-items:center;padding:24px;pointer-events:none}
.logo-bar svg{width:36px;height:36px;opacity:.9}
.logo-name{font-size:15px;font-weight:600;letter-spacing:.06em;margin-left:10px;opacity:.8}
.center-label{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:50;text-align:center;pointer-events:none}
.center-label h1{font-size:clamp(20px,3vw,32px);font-weight:700;letter-spacing:-.02em;line-height:1.3;text-shadow:0 4px 30px rgba(0,0,0,.8)}
.center-label h1 em{font-style:normal;color:var(--teal)}
.center-label p{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--grey);margin-top:12px}
.panel{flex:1;position:relative;overflow:hidden;cursor:pointer;transition:flex .6s cubic-bezier(.16,1,.3,1)}
.panel:hover{flex:1.15}
.scroll-col{position:absolute;display:flex;flex-direction:column;gap:8px;width:calc(50% - 12px);animation-timing-function:linear;animation-iteration-count:infinite}
.scroll-col.col-1{left:8px}
.scroll-col.col-2{right:8px}
.scroll-col.up{animation-name:scrollUp}
.scroll-col.down{animation-name:scrollDown}
@keyframes scrollUp{0%{transform:translateY(0)}100%{transform:translateY(-50%)}}
@keyframes scrollDown{0%{transform:translateY(-50%)}100%{transform:translateY(0)}}
.avatar{width:100%;aspect-ratio:1;border-radius:14px;position:relative;overflow:hidden}
.avatar::before{content:'';position:absolute;inset:0;border-radius:14px}
.panel-overlay{position:absolute;inset:0;background:rgba(8,8,15,.55);transition:background .5s;z-index:10}
.panel:hover .panel-overlay{background:rgba(8,8,15,.3)}
.panel-cta{position:absolute;bottom:60px;left:0;right:0;z-index:20;text-align:center;transition:all .5s cubic-bezier(.16,1,.3,1)}
.panel:hover .panel-cta{bottom:70px}
.panel-cta h2{font-size:clamp(18px,2.5vw,28px);font-weight:700;letter-spacing:.02em;margin-bottom:8px;text-shadow:0 2px 20px rgba(0,0,0,.6)}
.panel-cta .arrow{display:inline-flex;align-items:center;justify-content:center;width:48px;height:48px;border:2px solid var(--teal);border-radius:50%;margin-top:12px;transition:all .3s;opacity:.7}
.panel:hover .panel-cta .arrow{opacity:1;transform:translateY(-4px);box-shadow:0 0 24px rgba(0,191,166,.2);background:rgba(0,191,166,.1)}
.panel-cta .arrow svg{stroke:var(--teal);width:20px;height:20px}
.divider{position:fixed;top:0;bottom:0;left:50%;width:1px;background:linear-gradient(180deg,transparent,rgba(0,191,166,.3) 30%,rgba(0,191,166,.3) 70%,transparent);z-index:30;pointer-events:none}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;justify-content:center;gap:32px;padding:20px;pointer-events:none}
.bottom-bar span{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:.15em;text-transform:uppercase;color:var(--grey);opacity:.5}
@media(max-width:700px){
  .gateway{flex-direction:column}
  .divider{top:50%;bottom:auto;left:0;right:0;width:auto;height:1px;background:linear-gradient(90deg,transparent,rgba(0,191,166,.3) 30%,rgba(0,191,166,.3) 70%,transparent)}
  .scroll-col{width:calc(33.33% - 8px);gap:6px}
  .scroll-col.col-1{left:4px}
  .scroll-col.col-2{left:calc(33.33% + 2px)}
  .scroll-col.col-3{right:4px}
  .panel-cta{bottom:30px}
  .panel:hover .panel-cta{bottom:35px}
  .panel-cta h2{font-size:18px}
  .center-label h1{font-size:18px}
  .avatar{border-radius:10px}
  .panel-cta .arrow{width:40px;height:40px}
  .bottom-bar{gap:16px;padding:12px}
  .bottom-bar span{font-size:8px}
}
</style>
</head>
<body>
<div class="logo-bar">
  <svg viewBox="0 0 36 36" fill="none">
    <circle cx="12" cy="18" r="10" stroke="#00BFA6" stroke-width="1.2" fill="none" opacity=".6"/>
    <circle cx="24" cy="18" r="10" stroke="#00BFA6" stroke-width="1.2" fill="none" opacity=".4"/>
    <circle cx="18" cy="10" r="10" stroke="#00BFA6" stroke-width="1.2" fill="none" opacity=".8"/>
  </svg>
  <span class="logo-name">TRIAD NETWORK</span>
</div>
<div class="center-label">
  <h1>Choose your <em>path</em></h1>
  <p>Engineering · Advisory · Capital</p>
</div>
<div class="divider"></div>
<div class="gateway">
  <a href="/creators.html" class="panel" id="panel-creators">
    <div class="panel-overlay"></div>
    <div class="scroll-col col-1 up" style="animation-duration:25s" id="cr-col1"></div>
    <div class="scroll-col col-2 down" style="animation-duration:30s" id="cr-col2"></div>
    <div class="panel-cta">
      <h2>I'M A CREATOR</h2>
      <div class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
    </div>
  </a>
  <a href="/home.html" class="panel" id="panel-projects">
    <div class="panel-overlay"></div>
    <div class="scroll-col col-1 down" style="animation-duration:28s" id="pr-col1"></div>
    <div class="scroll-col col-2 up" style="animation-duration:22s" id="pr-col2"></div>
    <div class="panel-cta">
      <h2>I'M A PROJECT</h2>
      <div class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></div>
    </div>
  </a>
</div>
<div class="bottom-bar">
  <span>550+ Ventures</span>
  <span>400+ Products</span>
  <span>8+ Years</span>
  <span>London</span>
</div>
<script>
const creators = [
  {name:'Cobie', handle:'coaborozdottxt'},
  {name:'Hsaka', handle:'HsakaTrades'},
  {name:'Ansem', handle:'blaborozdoteth'},
  {name:'CryptoCred', handle:'CryptoCred'},
  {name:'Rune', handle:'RuneKek'},
  {name:'Pentoshi', handle:'Pentosh1'},
  {name:'GCR', handle:'GCRClassic'},
  {name:'Loomdart', handle:'loomdart'},
  {name:'Crypto Banter', handle:'crypto_banter'},
  {name:'Miles Deutscher', handle:'milaborozdeutscher'},
  {name:'DeFi Dad', handle:'DeFi_Dad'},
  {name:'The DeFi Edge', handle:'thedefiedge'},
  {name:'Crypto Birb', handle:'crypto_birb'},
  {name:'AltcoinGordon', handle:'AltcoinGordon'},
  {name:'MacnBTC', handle:'MacnBTC'},
  {name:'Crypto Tony', handle:'CryptoTony__'},
];
const projects = [
  {name:'Ethereum', img:'https://assets.coingecko.com/coins/images/279/small/ethereum.png'},
  {name:'Solana', img:'https://assets.coingecko.com/coins/images/4128/small/solana.png'},
  {name:'Avalanche', img:'https://assets.coingecko.com/coins/images/12559/small/Avalanche_Circle_RedWhite_Trans.png'},
  {name:'Polygon', img:'https://assets.coingecko.com/coins/images/4713/small/polygon.png'},
  {name:'Chainlink', img:'https://assets.coingecko.com/coins/images/877/small/chainlink-new-logo.png'},
  {name:'Arbitrum', img:'https://assets.coingecko.com/coins/images/16547/small/photo_2023-03-29_21.47.00.jpeg'},
  {name:'Optimism', img:'https://assets.coingecko.com/coins/images/25244/small/Optimism.png'},
  {name:'BNB Chain', img:'https://assets.coingecko.com/coins/images/825/small/bnb-icon2_2x.png'},
  {name:'NEAR', img:'https://assets.coingecko.com/coins/images/10365/small/near.jpg'},
  {name:'Cosmos', img:'https://assets.coingecko.com/coins/images/1481/small/cosmos_hub.png'},
  {name:'Uniswap', img:'https://assets.coingecko.com/coins/images/12504/small/uni.jpg'},
  {name:'Aave', img:'https://assets.coingecko.com/coins/images/12645/small/AAVE.png'},
  {name:'MakerDAO', img:'https://assets.coingecko.com/coins/images/1364/small/Mark_Maker.png'},
  {name:'Lido', img:'https://assets.coingecko.com/coins/images/13573/small/Lido_DAO.png'},
  {name:'Filecoin', img:'https://assets.coingecko.com/coins/images/12817/small/filecoin.png'},
  {name:'StarkNet', img:'https://assets.coingecko.com/coins/images/26433/small/starknet.png'},
];
function createImageTile(src, name, fallbackColors) {
  const div = document.createElement('div');
  div.className = 'avatar';
  const c = fallbackColors || ['#222','#111'];
  div.style.background = `linear-gradient(135deg, ${c[0]}, ${c[1]})`;
  div.style.display = 'flex';
  div.style.alignItems = 'center';
  div.style.justifyContent = 'center';
  const img = document.createElement('img');
  img.src = src;
  img.alt = name;
  img.style.cssText = 'width:70%;height:70%;object-fit:cover;border-radius:10px;opacity:0;transition:opacity .3s';
  img.onload = () => { img.style.opacity = '1'; div.style.background = 'rgba(15,15,25,.9)'; };
  img.onerror = () => { 
    img.remove();
    const txt = document.createElement('span');
    txt.textContent = name.split(' ').map(w=>w[0]).join('').substring(0,2);
    txt.style.cssText = 'font-size:20px;font-weight:700;color:rgba(255,255,255,.4);font-family:Space Grotesk,sans-serif';
    div.appendChild(txt);
  };
  div.appendChild(img);
  return div;
}
function populateColumn(containerId, items, type, count) {
  const container = document.getElementById(containerId);
  const tealFallbacks = [['#00BFA6','#004D40'],['#00897B','#1A237E'],['#26A69A','#283593'],['#00ACC1','#006064'],['#0097A7','#01579B'],['#00838F','#1B5E20'],['#009688','#311B92'],['#4DB6AC','#0D47A1']];
  const purpleFallbacks = [['#7C5CFC','#1A0A3E'],['#5C6BC0','#0D47A1'],['#7E57C2','#311B92'],['#9575CD','#4A148C'],['#5E35B1','#1A237E'],['#673AB7','#0D47A1'],['#7986CB','#283593'],['#9FA8DA','#1A237E']];
  const fallbacks = type === 'creator' ? tealFallbacks : purpleFallbacks;
  for (let round = 0; round < 2; round++) {
    for (let i = 0; i < count; i++) {
      const item = items[i % items.length];
      const fb = fallbacks[i % fallbacks.length];
      let src;
      if (type === 'creator') {
        src = `https://unavatar.io/x/${item.handle}`;
      } else {
        src = item.img;
      }
      container.appendChild(createImageTile(src, item.name, fb));
    }
  }
}
populateColumn('cr-col1', creators.slice(0, 8), 'creator', 8);
populateColumn('cr-col2', creators.slice(8), 'creator', 8);
populateColumn('pr-col1', projects.slice(0, 8), 'project', 8);
populateColumn('pr-col2', projects.slice(8), 'project', 8);
</script>
</body>
</html>
